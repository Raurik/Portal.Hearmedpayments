name: Deploy to SiteGround

on:
  push:
    branches: ["main"]

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block dangerous files from deploying
        run: |
          FOUND=$(find . -maxdepth 3 \( -name '*.dump' -o -name '*.bak' -o -name '*.zip' -o -name '*.gz' -o -name '*.tar' \) \
            ! -path './.github/*' | head -20)
          if [ -n "$FOUND" ]; then
            echo "::error::Dangerous files found in plugin directory — refusing to deploy:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No dangerous artifacts found."

  deploy:
    needs: safety-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.hearmedpayments.net
          username: u2157-eobi8upkunha
          port: 18765
          key: ${{ secrets.SG_SSH_KEY }}
          passphrase: ${{ secrets.SG_SSH_PASSPHRASE }}
          script: |
            cd ~/www/portal.hearmedpayments.net/public_html/wp-content/plugins/hearmed-calendar
            git pull origin main
            # Deploy MU-plugins
            mkdir -p ~/www/portal.hearmedpayments.net/public_html/wp-content/mu-plugins
            cp -f mu-plugins/disable-wp-login.php ~/www/portal.hearmedpayments.net/public_html/wp-content/mu-plugins/disable-wp-login.php
            cp -f mu-plugins/hearmed-opcache-flush.php ~/www/portal.hearmedpayments.net/public_html/wp-content/mu-plugins/hearmed-opcache-flush.php
            # Touch flag file — the mu-plugin will opcache_reset() on next web request
            touch ~/www/portal.hearmedpayments.net/public_html/wp-content/plugins/hearmed-calendar/.opcache-flush
            cd ~/www/portal.hearmedpayments.net/public_html
            # Warm the OPcache flush by hitting the site (any page triggers the mu-plugin)
            curl -s -o /dev/null "https://portal.hearmedpayments.net/" || true
            wp cache flush --allow-root 2>/dev/null || true
